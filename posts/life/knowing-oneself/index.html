<time datetime=2020-08-22T19:01:15+0800 class=date>Saturday, August 22, 2020</time></h1></header><section id=main><article class=post><div class=post-content><h3 id=参禅三重境界>参禅三重境界</h3><p>参禅之初，看山是山，看水是水；</p><p>禅有悟时，看山不是山，看水不是水；</p><p>禅中彻悟，看山仍是山，看水仍是水。</p><h3 id=人生也是如此>人生也是如此</h3><p>境界一：小时候接受的教育，家长说的话认为都是真理；</p><p>境界二：开始质疑，开始反思，开始独立思考，但是仍然飘忽不定；</p><p>境界三：高屋建瓴，宠辱不惊，已经有独立思考的能力，有自己的逻辑，有自己分析问题的方法，形成了健全的善恶观、是非观，意念不再受外界环境变化而动摇。</p></div><div class=post-meta><ul class=tags></ul></div></article><aside id=comments></aside></section><a id=back-to-top title="Go To Top" href=#><svg viewBox="0 0 24 24"><path fill="none" d="M0 0h24v24H0z"/><path d="M12 2 4.5 20.29l.71.71L12 18l6.79 3 .71-.71z"/></svg></a><footer id=footer><script src=/js/main.min.eadd59e1bd67148e5af7a90a1bca3434cf18ef3fc80ad858e897f7755bebf510.js integrity="sha256-6t1Z4b1nFI5a96kKG8o0NM8Y7z/ICthY6Jf3dVvr9RA=" crossorigin=anonymous async></script></footer></body></html>
